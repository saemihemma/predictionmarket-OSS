name: Bug report
description: Report a reproducible bug in the prediction market stack.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please include enough detail for someone new to the repo to reproduce the issue.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: List the exact steps, commands, route, wallet state, and network used.
      placeholder: |
        1. Go to ...
        2. Connect wallet ...
        3. Click ...
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification
      description: Which checks did you run locally?
      placeholder: |
        frontend: npm run build
        gas-relay: npm test
  - type: textarea
    id: logs
    attributes:
      label: Logs, screenshots, or transaction digests
      description: Paste errors, screenshots, or digests if available.
  - type: dropdown
    id: surface
    attributes:
      label: Affected surface
      options:
        - frontend
        - gas-relay
        - phase-bot
        - contracts
        - documentation
        - deployment / live ops
    validations:
      required: true
