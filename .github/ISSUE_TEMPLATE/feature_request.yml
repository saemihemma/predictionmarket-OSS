name: Feature request
description: Propose a product, protocol, or contributor-experience improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What user, operator, or contributor problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the desired behavior and any important constraints.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope and risks
      description: Call out trust-boundary, admin-lever, or migration risks if you see them.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What else could solve the same problem?
