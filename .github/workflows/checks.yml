name: Checks

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: checks-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Check docs
        run: node scripts/check-docs.mjs

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npm run test:a11y:install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Run accessibility smoke
        working-directory: frontend
        run: npm run test:a11y

  gas-relay:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: gas-relay/package-lock.json

      - name: Install gas relay dependencies
        working-directory: gas-relay
        run: npm ci

      - name: Build gas relay
        working-directory: gas-relay
        run: npm run build

      - name: Test gas relay
        working-directory: gas-relay
        run: npm test

  phase-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: phase-bot/package-lock.json

      - name: Install phase bot dependencies
        working-directory: phase-bot
        run: npm ci

      - name: Build phase bot
        working-directory: phase-bot
        run: npm run build

      - name: Test phase bot
        working-directory: phase-bot
        run: npm test

  contracts:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install suiup
        run: curl -sSfL https://raw.githubusercontent.com/MystenLabs/suiup/main/install.sh | sh

      - name: Add suiup to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install Sui CLI
        run: suiup install sui@mainnet-v1.67.3 -y

      - name: Print Sui version
        run: sui --version

      - name: Build Move package
        working-directory: contracts
        run: sui move build

      - name: Test Move package
        working-directory: contracts
        run: sui move test
